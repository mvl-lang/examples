[package]
name = "crud_api"
version = "0.4.2"
license = "Apache-2.0"
requires-mvl = ">=0.205.0"

[dependencies]
"github.com/mvl-lang/pkg-http" = { git = "https://github.com/mvl-lang/pkg-http", tag = "v0.5.0", rationale = "HTTP routing, request parsing — raw HTTP only since v0.4.0; JSON helpers moved to pkg-rest" }
"github.com/mvl-lang/pkg-sqlite" = { git = "https://github.com/mvl-lang/pkg-sqlite", tag = "v0.2.1", rationale = "SQLite FFI bindings via rusqlite — native code, not generatable" }
"github.com/mvl-lang/pkg-trace" = { git = "https://github.com/mvl-lang/pkg-trace", tag = "v0.4.0", rationale = "Distributed tracing — pure MVL spans emitted as logfmt/JSON to stderr" }
"github.com/mvl-lang/pkg-health" = { git = "https://github.com/mvl-lang/pkg-health", tag = "v0.4.1", rationale = "Health check endpoints for K8s liveness/readiness probes" }
"github.com/mvl-lang/pkg-metrics" = { git = "https://github.com/mvl-lang/pkg-metrics", tag = "v0.3.0", rationale = "Prometheus-style counters, gauges, histograms with ! Metric effect" }
"github.com/mvl-lang/pkg-rest" = { git = "https://github.com/mvl-lang/pkg-rest", tag = "v0.4.2", rationale = "Typed JSON server helpers (json_ok, body_json, param_int, etc.)" }
