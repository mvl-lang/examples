[package]
name = "crud_api"
version = "0.2.3"
license = "Apache-2.0"
requires-mvl = ">=0.205.0"

[dependencies]
"github.com/mvl-lang/pkg-http" = { git = "https://github.com/mvl-lang/pkg-http", tag = "v0.1.1", rationale = "HTTP routing, request parsing, and REST helpers — 2k+ LOC protocol implementation" }
"github.com/mvl-lang/pkg-sqlite" = { git = "https://github.com/mvl-lang/pkg-sqlite", tag = "v0.1.3", rationale = "SQLite FFI bindings via rusqlite — native code, not generatable" }
"github.com/mvl-lang/pkg-trace" = { git = "https://github.com/mvl-lang/pkg-trace", tag = "v0.3.0", rationale = "Distributed tracing — pure MVL spans emitted as logfmt/JSON to stderr" }
