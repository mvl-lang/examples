[package]
name = "crud_api"
version = "0.3.0"
license = "Apache-2.0"
requires-mvl = ">=0.205.0"

[dependencies]
"github.com/mvl-lang/pkg-http" = { git = "https://github.com/mvl-lang/pkg-http", tag = "v0.2.3", rationale = "HTTP routing, request parsing, and REST helpers — 2k+ LOC protocol implementation" }
"github.com/mvl-lang/pkg-sqlite" = { git = "https://github.com/mvl-lang/pkg-sqlite", tag = "v0.2.0", rationale = "SQLite FFI bindings via rusqlite — native code, not generatable" }
"github.com/mvl-lang/pkg-trace" = { git = "https://github.com/mvl-lang/pkg-trace", tag = "v0.4.0", rationale = "Distributed tracing — pure MVL spans emitted as logfmt/JSON to stderr" }
"github.com/mvl-lang/pkg-health" = { git = "https://github.com/mvl-lang/pkg-health", tag = "v0.2.0", rationale = "Health check endpoints for K8s liveness/readiness probes" }
"github.com/mvl-lang/pkg-metrics" = { git = "https://github.com/mvl-lang/pkg-metrics", tag = "v0.2.0", rationale = "Prometheus-style counters, gauges, histograms with ! Metric effect" }
